<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="envelope-view">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope-back"></div>
            <div class="card">
                <p>You're Invited!</p>
            </div>
            <div class="envelope-front"></div>
            <div class="envelope-flap"></div>
        </div>
        <p class="tap-text">Tap to Open</p>
    </div>

    <div id="invitation-view" class="hidden">
        <div class="invitation-card">
            <img src="placeholder.png" class="floating-decor decor-1" alt="">
            <img src="placeholder.png" class="floating-decor decor-2" alt="">
            <img src="placeholder.png" class="floating-decor decor-3" alt="">

            <div class="header-text">
                <h2>UN PEQUENO</h2>
                <h1>DUMPLING</h1>
                <p class="script-text">viene en camino</p>
            </div>

            <div class="main-graphic">
                <img src="placeholder.png" alt="Bao Dumpling">
            </div>

            <div class="details-text">
                <p class="small-caps">Acompañanos a un baby shower en honor a</p>
                <h2 class="name-text">Heidy Vega</h2>
            </div>

            <div class="logistics">
                <p>Sabado, 16 de Mayo, 2026 a las 4:00PM</p>
                <p>3527 47th ST., San Diego, CA 92105</p>
                <p class="rsvp">RSVP a Heidy al (619)123-4567</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
