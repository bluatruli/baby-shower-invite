<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower Invitation</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <div id="envelope-view">
        <div class="steamer-wrapper" id="steamer">
            <img src="images/steamer-bottom.png" class="steamer-bottom" alt="">
            <div class="card">
                <img src="images/ultrasound-polaroid.PNG" alt="">
                <p>Estas invitado!</p>
            </div>
            <img src="images/steamer-lid.PNG" class="steamer-lid" alt="">
        </div>

        <div class="bounce-arrow">↑</div>
        
        <p class="tap-text">Toca para abrir</p>
    </div>

    <div id="invitation-view" class="hidden">
        <div class="invitation-card">
            <div class="floating-decor decor-1 fade-in-on-scroll" style="--delay: 1" >
                <img src="images/steamer-ultrasound.PNG" alt="">
                <h1 class="header-text gender">Es una ni&ntilde;a!</h1>
            </div>

            <img src="images/Invite.png" class="floating-decor decor-2 fade-in-on-scroll" style="--delay: 2" alt="">

            <div class="floating-decor decor-3 fade-in-on-scroll" style="--delay: 1" > 
                <img src="images/fan-lighter.png" alt="">
                <a class="baby-registry" href="https://my.babylist.com/baby-reg-heidy-molina?session_synced=true" target="_blank">Registro de Bebe</a>
            </div>

            <!-- <img src="images/baby-registry-qr.jpeg" alt=""> -->

            <div class="floating-decor decor-4 fade-in-on-scroll" style="--delay: 2">   
                <img src="images/dumpling-says.png" alt="">
                <div class="diaper-raffle">
                    <h1 class="header-text">Rifa de pa&ntilde;ales</h1>
                    <p class="raffle-body">Trae un paquete de pa&ntilde;ales o toallas humedas, de cualquier tama&ntilde;o, para participar en un premio!</p>
                </div>
            </div>

            <div class="action-buttons">
                <a href="sms:6192478224?body=Hi%20Heidy!%20I'm%20RSVPing%20for%20the%20baby%20shower!" class="rsvp-button">
                    Haz clic aquí para confirmar tu asistencia
                </a>
                <button id="calendar-btn" class="calendar-button">
                    🗓️ Guardar en Calendario
                </button>
            </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
